name: Build and Deploy uteo-web-client

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  build-and-push:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.uteo.ai/api/v1
            NEXT_PUBLIC_WS_URL=https://api.uteo.ai
            NEXT_PUBLIC_JAAS_APP_ID=vpaas-magic-cookie-315e6ce2ff244da49ecbd19f303846d7
          push: true
          tags: |
            ghcr.io/web-masters-ke/uteo-web-client:${{ github.sha }}
            ghcr.io/web-masters-ke/uteo-web-client:latest

  update-helm-chart:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helm-charts-on-prem
        uses: actions/checkout@v4
        with:
          repository: web-masters-ke/helm-charts-on-prem
          ref: main
          token: ${{ secrets.HELM_CHARTS_PAT }}

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Update web client image tag
        run: yq e '.image.tag = "${{ github.sha }}"' -i charts/uteo-web-client/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/uteo-web-client/values.yaml
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "ci(uteo-web-client): update image tag to ${{ github.sha }}"
          for i in 1 2 3 4 5; do
            git push && break
            echo "Push failed, retrying with rebase (attempt $i)..."
            git pull --rebase origin main
            sleep $((i * 2))
          done
